version: '3.8'

services:
  # 磁區規劃系統 API
  disk-planning-api:
    build: .
    container_name: disk-planning-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.json:/app/config.json
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
    depends_on:
      - mysql
    networks:
      - disk-planning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 磁區規劃前端
  disk-planning-frontend:
    image: node:18-alpine
    container_name: disk-planning-frontend
    working_dir: /app
    ports:
      - "3002:3002"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3002"
    depends_on:
      - disk-planning-api
    networks:
      - disk-planning-network
    restart: unless-stopped

  # MySQL 資料庫
  mysql:
    image: mysql:8.0
    container_name: disk-planning-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Password123..
      MYSQL_DATABASE: dataease
      MYSQL_USER: dataease
      MYSQL_PASSWORD: DataEase@123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - disk-planning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # DataEase BI 平台
  dataease:
    image: dataease/dataease:v2.9.0
    container_name: disk-planning-dataease
    ports:
      - "8081:8081"
    environment:
      DE_MYSQL_HOST: mysql
      DE_MYSQL_PORT: 3306
      DE_MYSQL_DB: dataease
      DE_MYSQL_USERNAME: dataease
      DE_MYSQL_PASSWORD: DataEase@123456
    volumes:
      - dataease_data:/opt/dataease2.0/data
      - dataease_logs:/opt/dataease2.0/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - disk-planning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s

  # Redis (可選，用於快取)
  redis:
    image: redis:7-alpine
    container_name: disk-planning-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - disk-planning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理 (可選)
  nginx:
    image: nginx:alpine
    container_name: disk-planning-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - disk-planning-api
      - disk-planning-frontend
      - dataease
    networks:
      - disk-planning-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  dataease_data:
    driver: local
  dataease_logs:
    driver: local
  redis_data:
    driver: local

networks:
  disk-planning-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16