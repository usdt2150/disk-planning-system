version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - DATAEASE_HOST=dataease
      - DB_HOST=mysql
    depends_on:
      - mysql
      - dataease
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  dataease:
    image: dataease/dataease:latest
    ports:
      - "8081:8081"
    environment:
      - DE_MYSQL_HOST=mysql
      - DE_MYSQL_PORT=3306
      - DE_MYSQL_DB=${DB_NAME}
      - DE_MYSQL_USERNAME=${DB_USERNAME}
      - DE_MYSQL_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql
    volumes:
      - dataease_data:/opt/dataease/data
    restart: unless-stopped

volumes:
  mysql_data:
  dataease_data: